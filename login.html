<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Disease Prediction System</title>
<style>
/* (NO CHANGE IN CSS — kept same) */
body.login-page {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('https://c8.alamy.com/comp/TBDHAA/stethoscope-isolated-on-white-TBDHAA.jpg') no-repeat center center/cover;
    height: 100vh;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
body.login-page::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 40, 70, 0.75);
    z-index: -1;
}
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    z-index: 1000;
}
nav h2 { margin: 0; font-size: 24px; }
nav ul { list-style: none; display: flex; gap: 25px; }
nav ul li { cursor: pointer; font-size: 16px; }
nav ul li:hover { color: #00d2ff; }

.login-container {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
.login-container h2 {
    margin-bottom: 30px;
    color: #00d2ff;
    font-size: 28px;
}
.form-group {
    margin-bottom: 20px;
    text-align: left;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #e0e0e0;
    font-weight: 500;
}
.form-group input {
    width: 100%;
    padding: 12px 15px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.9);
    font-size: 16px;
    box-sizing: border-box;
}
.login-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(45deg, #00a8ff, #00d2ff);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}
.signup-link { margin-top: 20px; }
.signup-link a { color: #00d2ff; text-decoration: none; }
footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}
</style>
</head>

<body class="login-page">

<nav>
    <h2>🏥 HealthCare AI</h2>
    <ul>
        <!-- ✅ FIXED: use route -->
        <li onclick="window.location.href='/'">Home</li>
    </ul>
</nav>

<div class="login-container">
    <h2>🔐 Login</h2>

    <!-- ✅ FIXED: no <a> tag -->
    <form onsubmit="loginUser(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <!-- ✅ FIXED BUTTON -->
        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="signup-link">
        <!-- ✅ FIXED route -->
        <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    </div>
</div>

<footer>© 2026 Disease Prediction System</footer>

<script>
function loginUser(event){
    event.preventDefault();

    let email = document.querySelector("input[type=email]").value;
    let password = document.querySelector("input[type=password]").value;

    if(email && password){
        // ✅ FIXED: use Flask route (NOT .html)
        window.location.href = "/patient";
    } else {
        alert("Please enter valid credentials!");
    }
}
</script>

</body>
</html>
